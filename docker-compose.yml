services:
  gem-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gem-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    environment:
      - DB_HOST=gem-postgres
      - DB_PORT=5432
      - DB_DATABASE=gem_motors
      - DB_USERNAME=gem_user
      - DB_PASSWORD=gem_password
    depends_on:
      gem-postgres:
        condition: service_healthy
    networks:
      - gem-network

  gem-web:
    image: nginx:alpine
    container_name: gem-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gem-backend
    networks:
      - gem-network

  gem-postgres:
    image: postgres:15
    container_name: gem-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=gem_motors
      - POSTGRES_USER=gem_user
      - POSTGRES_PASSWORD=gem_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gem_user -d gem_motors"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gem-network

  gem-seeder:
    image: postgres:15
    container_name: gem-seeder
    depends_on:
      gem-postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=gem_password
    command: >
      bash -c "
        psql -h gem-postgres -U gem_user -d gem_motors -f /sql/migration.sql &&
        psql -h gem-postgres -U gem_user -d gem_motors -f /sql/seed.sql
      "
    volumes:
      - ./backend/database/migration.sql:/sql/migration.sql
      - ./backend/database/seed.sql:/sql/seed.sql
    networks:
      - gem-network
    restart: "no"

networks:
  gem-network:
    driver: bridge

volumes:
  postgres_data: